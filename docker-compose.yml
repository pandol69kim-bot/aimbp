services:
  db:
    image: postgres:16
    container_name: aimbp-db
    environment:
      POSTGRES_DB: aimbp
      POSTGRES_USER: aimbp
      POSTGRES_PASSWORD: aimbp1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aimbp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimbp -d aimbp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aimbp-backend
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    networks:
      - aimbp-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aimbp-frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
      - NODE_ENV=development
      - FORCE_COLOR=1
    networks:
      - aimbp-network
    command: npm run dev -- --hostname 0.0.0.0
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  frontend_node_modules:

networks:
  aimbp-network:
    driver: bridge
